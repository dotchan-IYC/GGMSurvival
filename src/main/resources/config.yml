# GGMSurvival 설정 파일

# 직업 시스템
job_system:
  enabled: true
  max_level: 10                      # 최대 레벨
  exp_multiplier: 1.0                # 경험치 배율

  # 직업별 경험치 (몬스터 종류별)
  exp_values:
    zombie: 10
    skeleton: 12
    spider: 8
    creeper: 15
    enderman: 25
    wither_skeleton: 30
    blaze: 20
    ghast: 35

# 강화 시스템
upgrade_system:
  enabled: true
  max_level: 10                      # 최대 강화 레벨

  # 강화 비용 (G)
  upgrade_costs:
    1: 1000
    2: 2000
    3: 4000
    4: 8000
    5: 16000
    6: 32000
    7: 64000
    8: 128000
    9: 256000
    10: 512000

  # 강화 성공률 (%)
  success_rates:
    1: 100
    2: 90
    3: 80
    4: 70
    5: 60
    6: 50
    7: 40
    8: 30
    9: 20
    10: 10

  downgrade_enabled: true            # 강화 실패 시 하락 여부
  downgrade_start_level: 5           # 하락 감소 시작점

  # 강화 방법 설정
  upgrade_methods:
    enchant_table: true              # 인첸트 테이블 강화 허용
    command_gui: true                # /upgrade gui 명령어 허용
    direct_command: true             # /upgrade direct 명령어 허용
    force_enchant_options: true      # 인첸트된 아이템도 테이블에 옵션 표시

# 드래곤 보상 시스템
dragon_reward:
  enabled: true
  base_reward: 100000                # 기본 보상 (100,000G)
  min_reward: 10000                  # 최소 보상 (10,000G)
  min_damage_threshold: 50           # 최소 기여도

# NPC 교환 시스템
npc_system:
  enabled: true
  max_npcs: 50                       # 최대 NPC 수
  npc_protection: true               # NPC 보호 (무적)
  npc_ai_disabled: true              # NPC AI 비활성화

# 엔더 리셋 시스템
ender_reset:
  enabled: true
  hour: 12                           # 리셋 시간 (24시간 형식)
  minute: 0                          # 리셋 분

  # 엔드시티 차단 설정
  block_end_cities: true             # 엔드시티 접근 차단
  end_city_min_distance: 1000        # 엔드시티 차단 최소 거리 (블록)

  # 플레이어 이동 설정
  target_server: "survival"          # 리셋 시 플레이어 이동 대상 서버
  use_bungee_teleport: true          # BungeeCord 연동 사용

  # 예고 알림 설정
  warning_times: [10, 5, 3, 1]       # 예고 알림 시간 (분)
  warning_sounds: true               # 경고음 재생
  warning_actionbar: true            # ActionBar 경고 표시

# 서버별 기능 설정
server_features:
  auto_detect_server: true           # 서버 타입 자동 감지 (포트 기반)
  server_type: "survival"            # 수동 서버 타입 설정

  # 기능별 활성화 설정
  features:
    job_system: true                 # 직업 시스템 (모든 서버에서 활성화)
    job_selection: true              # 직업 선택 GUI
    upgrade_system: false            # 강화 시스템 (야생에서만)
    dragon_reward: false             # 드래곤 보상 (야생에서만)
    npc_trading: false               # NPC 교환 (야생에서만)
    ender_reset: false               # 엔더 리셋 (야생에서만)

  # 서버별 자동 설정 (포트 기반)
  server_configs:
    25565: # 로비 서버
      job_system: true
      job_selection: true
      upgrade_system: false
      dragon_reward: false
      npc_trading: false
      ender_reset: false

    25566: # 건축 서버
      job_system: true
      job_selection: true
      upgrade_system: false
      dragon_reward: false
      npc_trading: false
      ender_reset: false

    25567: # 야생 서버
      job_system: true
      job_selection: true
      upgrade_system: true           # 새로운 강화 시스템
      dragon_reward: true
      npc_trading: true
      ender_reset: true              # 엔더 리셋 시스템

    25568: # 마을 서버
      job_system: true
      job_selection: true
      upgrade_system: false
      dragon_reward: false
      npc_trading: false
      ender_reset: false

# 메시지 설정
messages:
  prefix: "[GGM] "

  # 직업 관련 메시지
  job_selection_required: "직업을 선택하여 특수 능력을 활용하세요!"
  job_selection_reminder: "아직 직업을 선택하지 않으셨습니다! /job select 명령어를 사용하세요."
  job_selected: "{job} 직업을 선택하셨습니다! 몬스터를 처치하여 레벨을 올리세요."
  job_already_selected: "이미 직업을 선택하셨습니다. 변경은 불가능합니다."
  job_level_up: "직업 레벨업! {old_level} → {new_level}"
  job_exp_gain: "+ {exp} 직업 경험치 ({monster})"
  job_max_level: "만렙 10 달성! 최강의 능력을 얻었습니다!"

  # 만렙 특수 효과 메시지
  tank_max_level_effect: "탱커 만렙: 흉갑 착용시 체력 +4칸 (28HP)"
  warrior_critical_hit: "크리티컬 발동! 2.5배 데미지!"
  archer_triple_shot: "트리플 샷! 화살 3발 발사!"

  # 강화 관련 메시지
  upgrade_success: "{level}강 강화 성공!"
  upgrade_failure: "{level}강 강화 실패!"
  upgrade_downgrade: "강화 레벨이 {level}강으로 하락했습니다!"
  upgrade_not_available: "이 아이템은 강화할 수 없습니다! (강화 가능: 검, 도끼, 활, 흉갑)"
  upgrade_max_level: "이미 최대 강화 레벨(10강)에 도달했습니다!"

  # 효과 관련 메시지
  tank_shield_heal: "방패 방어! +{amount} 체력 회복"
  warrior_speed_boost: "검의 힘! 이동속도 증가!"
  archer_speed_boost: "궁수의 민첩! 이동속도 증가!"

  # 엔더 리셋 관련 메시지
  ender_reset_warning: "[엔더 리셋] {minutes}분 후 엔드 차원이 초기화됩니다!"
  ender_reset_start: "[엔더 리셋] 엔드 차원 초기화 중..."
  ender_reset_complete: "엔드 차원 초기화 완료!"
  ender_city_blocked: "[엔드시티 차단] 엔드시티 지역은 접근이 제한됩니다!"
  player_moved_to_server: "[엔더 리셋] {server} 서버로 안전하게 이동되었습니다!"

# 디버그 설정
debug:
  enabled: false                     # 디버그 모드
  log_level: "INFO"                  # 로그 레벨 (DEBUG, INFO, WARN, ERROR)
  performance_monitoring: false      # 성능 모니터링