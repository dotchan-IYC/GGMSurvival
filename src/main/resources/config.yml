# GGMSurvival 멀티 서버 통합 플러그인 설정
# 이 플러그인은 모든 서버에 설치할 수 있으며, 서버별로 다른 기능을 활성화할 수 있습니다.

# 데이터베이스 설정 (GGMCore와 공유)
database:
  host: "localhost"
  port: 3306
  database: "ggm_server"
  username: "root"
  password: "1224"

# 직업 시스템 설정 (개선된 버전)
job_system:
  enabled: true
  force_job_selection: true          # 접속 시 직업 선택 강제
  allow_job_change: false            # 직업 변경 허용 여부 (NONE에서만 선택 가능)
  job_selection_delay: 60            # 접속 후 직업 선택 알림 지연 (초)

  # 직업 변경 정책 (새로 추가)
  job_change_policy:
    allow_change_from_none: true     # 직업이 없을 때(NONE) 선택 허용
    allow_change_from_job: false     # 이미 직업이 있을 때 변경 허용 (false 고정)
    admin_can_reset: true            # 관리자 직업 초기화 허용
    reset_command_enabled: true      # /job reset 명령어 활성화
    confirmation_delay: 5            # 직업 선택 최종 확인 지연 시간 (초)

  # 직업 선택 GUI 설정
  gui:
    title: "§6§l직업 선택"
    show_warning_item: true          # 경고 아이템 표시
    require_confirmation: true       # 최종 확인 단계 필요
    auto_select_delay: 5             # 자동 선택 지연 시간 (초)

  # 직업별 효과 설정
  tank:
    health_bonus: 4.0                # 추가 체력 (하트 2개)
    shield_heal_amount: 1.0          # 방패 사용 시 회복량
    shield_cooldown: 3000            # 방패 회복 쿨다운 (밀리초)
    damage_reduction: 0.1            # 받는 피해 감소 (10%)

  warrior:
    sword_damage_bonus: 0.2          # 검 공격력 증가 (20%)
    critical_chance: 0.1             # 치명타 확률 (10%)
    critical_multiplier: 1.5         # 치명타 배율
    durability_save_chance: 0.15     # 내구도 소모 방지 확률 (15%)

  archer:
    bow_damage_bonus: 0.15           # 활 공격력 증가 (15%)
    arrow_save_chance: 0.2           # 화살 소모 방지 확률 (20%)
    leather_boots_speed: 1           # 가죽부츠 착용 시 속도 레벨
    movement_speed_bonus: 0.1        # 이동속도 보너스

# 강화 시스템 설정 (개선된 버전)
upgrade_system:
  enabled: true
  max_upgrade_level: 10              # 최대 강화 레벨

  # 강화 방법 설정 (새로 추가)
  upgrade_methods:
    enchant_table: true              # 인첸트 테이블 강화 허용
    command_gui: true                # /upgrade gui 명령어 허용
    direct_command: true             # /upgrade direct 명령어 허용
    force_enchant_options: true      # 인첸트된 아이템도 테이블에 옵션 표시

  # 인첸트 테이블 강화 설정
  enchant_table_upgrade:
    show_fake_enchants: true         # 가짜 인첸트 옵션 표시 (강화용)
    cancel_real_enchants: true       # 실제 인첸트는 취소하고 강화만 적용
    close_table_after_upgrade: true  # 강화 후 테이블 자동 닫기
    exp_cost_display: true           # 경험치 비용 표시 (실제로는 G 사용)

  # 강화 비용 (레벨별)
  costs:
    1: 1000      # 1강: 1,000G
    2: 2000      # 2강: 2,000G
    3: 4000      # 3강: 4,000G
    4: 8000      # 4강: 8,000G
    5: 15000     # 5강: 15,000G
    6: 25000     # 6강: 25,000G
    7: 40000     # 7강: 40,000G
    8: 70000     # 8강: 70,000G
    9: 120000    # 9강: 120,000G
    10: 200000   # 10강: 200,000G

  # 성공 확률 (레벨별)
  success_rates:
    1: 95        # 1강: 95%
    2: 90        # 2강: 90%
    3: 85        # 3강: 85%
    4: 80        # 4강: 80%
    5: 70        # 5강: 70%
    6: 60        # 6강: 60%
    7: 50        # 7강: 50%
    8: 40        # 8강: 40%
    9: 30        # 9강: 30%
    10: 20       # 10강: 20%

  # 실패 시 강화 레벨 감소 시작점
  downgrade_start_level: 5

  # 강화별 능력 증가율
  stat_bonus_per_level: 10           # 레벨당 능력 증가 (%)

  # 강화 가능한 아이템 타입
  upgradeable_items:
    weapons: true                    # 무기류 (검, 활, 삼지창 등)
    tools: true                      # 도구류 (곡괭이, 도끼, 삽 등)
    armor: true                      # 방어구류 (투구, 흉갑, 각반, 부츠)
    shields: true                    # 방패

  # 강화 효과 설정
  effects:
    apply_enchantments: true         # 강화 시 자동 인첸트 적용
    update_display_name: true        # 아이템 이름에 강화 표시
    add_lore: true                   # 로어에 강화 정보 추가
    visual_effects: true             # 강화 시 파티클/사운드 효과

# 드래곤 보상 시스템 (최소 공적치 50으로 변경)
dragon_reward:
  enabled: true
  base_reward: 100000                # 기본 보상 (100,000G)
  min_reward: 10000                  # 최소 보상 (10,000G)
  min_damage_threshold: 50           # 최소 기여도 (50으로 변경!)

# NPC 교환 시스템 설정
npc_system:
  enabled: true
  max_npcs: 50                       # 최대 NPC 수
  npc_protection: true               # NPC 보호 (무적)
  npc_ai_disabled: true              # NPC AI 비활성화

# 서버별 기능 설정 (모든 서버에 설치 가능)
server_features:
  # 서버 타입 자동 감지 (포트 기반)
  auto_detect_server: true

  # 수동 서버 타입 설정 (auto_detect_server가 false일 때만 사용)
  server_type: "survival"           # lobby, build, survival, village

  # 기능별 활성화 설정
  features:
    # 직업 시스템 (모든 서버에서 활성화)
    job_system: true                # 직업 효과는 모든 서버에서 적용
    job_selection: true             # 직업 선택 GUI (모든 서버에서 가능)

    # 야생 서버 전용 기능들
    upgrade_system: false           # G 강화 시스템 (야생에서만)
    dragon_reward: false            # 드래곤 보상 (야생에서만)
    npc_trading: false              # NPC 교환 (야생에서만)

  # 서버별 자동 설정 (포트 기반)
  server_configs:
    25565: # 로비 서버
      job_system: true
      job_selection: true
      upgrade_system: false
      dragon_reward: false
      npc_trading: false

    25566: # 건축 서버
      job_system: true
      job_selection: true
      upgrade_system: false
      dragon_reward: false
      npc_trading: false

    25567: # 야생 서버
      job_system: true
      job_selection: true
      upgrade_system: true
      dragon_reward: true
      npc_trading: true

    25568: # 마을 서버
      job_system: true
      job_selection: true
      upgrade_system: false
      dragon_reward: false
      npc_trading: false

