# GGMSurvival 완전 안정화 설정 파일
# 강화시스템: 검, 도끼, 활, 흉갑만 강화 가능
# 직업레벨: 몬스터 처치로 성장하는 직업 시스템

# ============================================================================
# 데이터베이스 설정
# ============================================================================
database:
  host: "localhost"
  port: 3306
  database: "ggm_server"
  username: "root"
  password: "1224"

  # 연결 풀 설정 (HikariCP)
  pool:
    maximum_pool_size: 20
    minimum_idle: 5
    connection_timeout: 30000
    idle_timeout: 600000
    max_lifetime: 1800000

# ============================================================================
# 새로운 직업레벨 시스템
# ============================================================================
job_system:
  enabled: true
  force_job_selection: true          # 접속 시 직업 선택 강제
  allow_job_change: false            # 직업 변경 허용 여부 (NONE에서만 선택 가능)
  job_selection_delay: 60            # 접속 후 직업 선택 알림 지연 (초)
  max_job_level: 10                  # 최대 직업 레벨
  level5_special_effects: true       # 레벨 5 특수 효과 활성화
  level10_max_effects: true          # 레벨 10 만렙 효과 활성화

  # 직업레벨 경험치 설정
  experience:
    # 레벨업에 필요한 경험치
    requirements:
      1: 100      # 1레벨: 100exp
      2: 250      # 2레벨: 250exp
      3: 500      # 3레벨: 500exp
      4: 800      # 4레벨: 800exp
      5: 1200     # 5레벨: 1200exp (특수 효과)
      6: 1700     # 6레벨: 1700exp
      7: 2300     # 7레벨: 2300exp
      8: 3000     # 8레벨: 3000exp
      9: 3800     # 9레벨: 3800exp
      10: 4700    # 10레벨: 4700exp (최대)

    # 몬스터별 경험치
    monster_exp:
      # 일반 몬스터
      ZOMBIE: 10
      SKELETON: 10
      SPIDER: 8
      CREEPER: 12
      SLIME: 5
      CAVE_SPIDER: 12

      # 중간 몬스터
      ENDERMAN: 25
      WITCH: 20
      PILLAGER: 15
      VINDICATOR: 18
      EVOKER: 30
      RAVAGER: 35

      # 강한 몬스터
      WITHER_SKELETON: 40
      BLAZE: 30
      GHAST: 35
      MAGMA_CUBE: 25

      # 보스 몬스터
      ENDER_DRAGON: 1000
      WITHER: 500
      ELDER_GUARDIAN: 200

  # 직업별 효과 설정
  jobs:
    tank:
      damage_bonus_per_level: 0.02     # 레벨당 데미지 보너스 (2%)
      health_bonus_level5: 4.0         # 레벨 5 시 추가 체력 (하트 2개)
      health_bonus_level10: 8.0        # 레벨 10 시 추가 체력 (하트 4개)
      shield_heal_amount: 1.0          # 방패 방어 시 회복량
      shield_cooldown: 3000            # 방패 회복 쿨다운 (밀리초)
      shield_defense_chance: 0.3       # 방패 방어 확률 (30%)

    warrior:
      sword_damage_bonus: 0.05         # 레벨당 검 공격력 증가 (5%)
      level5_attack_speed: true        # 레벨 5 시 공격속도 증가
      level10_critical_chance: 10      # 레벨 10 시 크리티컬 확률 (10%)
      critical_multiplier: 2.5         # 크리티컬 배율 (2.5배)
      speed_boost_duration: 100        # 공격속도 증가 지속시간 (틱)

    archer:
      bow_damage_bonus: 0.03           # 레벨당 활 공격력 증가 (3%)
      level5_speed_bonus: 0.02         # 레벨 5 시 이동속도 보너스 (20%)
      level10_triple_shot: true        # 레벨 10 시 트리플 샷
      leather_boots_required: true     # 가죽장화 착용 필요
      speed_boost_message: true        # 속도 보너스 메시지 표시

# ============================================================================
# 새로운 강화 시스템 (검, 도끼, 활, 흉갑만)
# ============================================================================
upgrade_system:
  enabled: true
  max_upgrade_level: 10              # 최대 강화 레벨

  # 강화 성공률 (레벨별)
  success_rates:
    1: 0.95    # 1강: 95%
    2: 0.95    # 2강: 95%
    3: 0.95    # 3강: 95%
    4: 0.80    # 4강: 80%
    5: 0.80    # 5강: 80%
    6: 0.60    # 6강: 60%
    7: 0.60    # 7강: 60%
    8: 0.40    # 8강: 40%
    9: 0.40    # 9강: 40%
    10: 0.20   # 10강: 20%

  # 파괴/하락률 (레벨별)
  destroy_rates:
    1: 0.0     # 1강: 파괴되지 않음
    2: 0.0     # 2강: 파괴되지 않음
    3: 0.0     # 3강: 파괴되지 않음
    4: 0.0     # 4강: 파괴되지 않음
    5: 0.10    # 5강: 10% 하락
    6: 0.10    # 6강: 10% 하락
    7: 0.10    # 7강: 10% 하락
    8: 0.20    # 8강: 20% 하락
    9: 0.20    # 9강: 20% 하락
    10: 0.30   # 10강: 30% 하락

  # 파괴/하락이 시작되는 레벨
  downgrade_start_level: 5

  # 강화 방법 설정
  upgrade_methods:
    enchant_table: true              # 인첸트 테이블 강화 허용
    command_gui: true                # /upgrade gui 명령어 허용
    direct_command: true             # /upgrade direct 명령어 허용
    force_enchant_options: true      # 인첸트된 아이템도 테이블에 옵션 표시

  # 도끼 공격속도 시스템
  axe_speed:
    enabled: true
    speed_per_level: 0.02            # 레벨당 공격속도 증가 (2%)
    max_speed_bonus: 0.20            # 최대 공격속도 보너스 (20%)

  # 강화 비용 (경험치 레벨)
  experience_costs:
    1: 5      # 1강: 5레벨
    2: 5      # 2강: 5레벨
    3: 5      # 3강: 5레벨
    4: 10     # 4강: 10레벨
    5: 10     # 5강: 10레벨
    6: 15     # 6강: 15레벨
    7: 15     # 7강: 15레벨
    8: 20     # 8강: 20레벨
    9: 20     # 9강: 20레벨
    10: 30    # 10강: 30레벨

# ============================================================================
# 드래곤 보상 시스템
# ============================================================================
dragon_reward:
  enabled: true
  base_reward: 100000                # 기본 보상 (100,000G)
  min_reward: 10000                  # 최소 보상 (10,000G)
  min_damage_threshold: 50.0         # 최소 기여도 (데미지)
  damage_timeout: 300000             # 기여도 만료 시간 (5분, 밀리초)

  # 보상 계산 설정
  contribution_bonus: 1.0            # 기여도 보너스 배율
  participation_bonus: 5000          # 참가 보너스 (기본 지급)

# ============================================================================
# NPC 교환 시스템
# ============================================================================
npc_system:
  enabled: true
  max_npcs: 50                       # 최대 NPC 수
  npc_protection: true               # NPC 보호 (무적)
  npc_ai_disabled: true              # NPC AI 비활성화

  # 기본 교환 설정
  default_trades:
    enabled: true
    item_trader_enabled: true
    resource_trader_enabled: true
    special_trader_enabled: true

# ============================================================================
# 경제 시스템
# ============================================================================
economy:
  starting_money: 1000               # 시작 금액
  max_balance: 1000000000000         # 최대 잔액 (1조)
  min_balance: 0                     # 최소 잔액
  cache_timeout: 300000              # 캐시 만료 시간 (5분)

  # GGMCore 연동 설정
  ggmcore_integration: true          # GGMCore 연동 시도
  fallback_to_local: true            # 연동 실패 시 로컬 모드

# ============================================================================
# 서버별 기능 설정
# ============================================================================
server_features:
  auto_detect_server: true           # 서버 타입 자동 감지 (포트 기반)
  server_type: "survival"            # 수동 서버 타입 설정

  # 기능별 활성화 설정 (기본값)
  features:
    job_system: true                 # 직업 시스템
    job_selection: true              # 직업 선택 GUI
    upgrade_system: false            # 강화 시스템 (야생에서만)
    dragon_reward: false             # 드래곤 보상 (야생에서만)
    npc_trading: false               # NPC 교환 (야생에서만)

  # 서버별 자동 설정 (포트 기반)
  server_configs:
    25565: # 로비 서버
      job_system: true
      job_selection: true
      upgrade_system: false
      dragon_reward: false
      npc_trading: false

    25566: # 건축 서버
      job_system: true
      job_selection: true
      upgrade_system: false
      dragon_reward: false
      npc_trading: false

    25567: # 야생 서버
      job_system: true
      job_selection: true
      upgrade_system: true           # 새로운 강화 시스템
      dragon_reward: true
      npc_trading: true

    25568: # 마을 서버
      job_system: true
      job_selection: true
      upgrade_system: false
      dragon_reward: false
      npc_trading: false

# ============================================================================
# 메시지 설정
# ============================================================================
