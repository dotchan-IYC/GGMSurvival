# ============================================================================
# GGMSurvival 완전 통합 야생 서버 플러그인 설정
# HikariCP + EnderResetManager 버전
# ============================================================================

# ============================================================================
# 데이터베이스 설정 (HikariCP)
# ============================================================================
database:
  # 기본 연결 정보
  host: "localhost"
  port: 3306
  database: "ggmsurvival"
  username: "root"
  password: "password"

  # HikariCP 연결 풀 설정
  hikari:
    maximum_pool_size: 10          # 최대 연결 수
    minimum_idle: 2                # 최소 유휴 연결 수
    connection_timeout: 30000      # 연결 타임아웃 (30초)
    idle_timeout: 600000          # 유휴 타임아웃 (10분)
    max_lifetime: 1800000         # 최대 연결 수명 (30분)
    leak_detection_threshold: 60000 # 연결 누수 감지 (1분)

  # 추가 설정
  ssl: false                      # SSL 사용 여부
  auto_reconnect: true           # 자동 재연결
  cache_prep_stmts: true         # 준비된 구문 캐시
  use_server_prep_stmts: true    # 서버 측 준비된 구문

# ============================================================================
# 경제 시스템 설정
# ============================================================================
economy:
  # 기본 경제 설정
  starting_money: 1000           # 신규 플레이어 시작 돈
  max_money: 999999999          # 최대 보유 가능 돈

  # GGMCore 연동 설정
  use_ggmcore: true             # GGMCore 경제 시스템 연동 여부
  fallback_mode: true           # GGMCore 실패 시 독립 모드 사용

  # 화폐 단위
  currency_symbol: "G"          # 화폐 기호
  currency_name: "골드"         # 화폐 이름

# ============================================================================
# 직업 시스템 설정
# ============================================================================
job_system:
  enabled: true                 # 직업 시스템 활성화 여부

  # 직업별 설정
  jobs:
    tank:
      name: "탱커"
      description: "방어에 특화된 직업"
      health_bonus: 4.0         # 추가 체력 (하트 2개)
      defense_bonus: 0.15       # 방어력 15% 증가
      speed_penalty: -0.02      # 이동속도 2% 감소

    warrior:
      name: "전사"
      description: "근접 공격에 특화된 직업"
      attack_bonus: 0.20        # 공격력 20% 증가
      critical_chance: 0.15     # 치명타 확률 15%

    archer:
      name: "궁수"
      description: "원거리 공격에 특화된 직업"
      bow_damage_bonus: 0.25    # 활 공격력 25% 증가
      speed_bonus: 0.05         # 이동속도 5% 증가
      arrow_recovery: 0.30      # 화살 회수 확률 30%

  # 직업 변경 설정
  job_change:
    cost: 5000                  # 직업 변경 비용
    cooldown: 86400             # 직업 변경 쿨다운 (24시간)
    free_changes: 1             # 무료 변경 횟수

# ============================================================================
# 강화 시스템 설정
# ============================================================================
upgrade_system:
  enabled: true                 # 강화 시스템 활성화 여부

  # 강화 성공률 (1강~10강)
  success_rates:
    1: 100
    2: 90
    3: 80
    4: 70
    5: 60
    6: 50
    7: 40
    8: 30
    9: 20
    10: 10

  # 강화 비용 (1강~10강)
  upgrade_costs:
    1: 1000
    2: 2000
    3: 4000
    4: 8000
    5: 16000
    6: 32000
    7: 64000
    8: 128000
    9: 256000
    10: 512000

  # 강화 효과
  damage_bonus_per_level: 0.05  # 레벨당 공격력 5% 증가
  durability_bonus_per_level: 100 # 레벨당 내구도 100 증가

  # 강화 실패 시
  destroy_on_fail: false       # 실패 시 아이템 파괴 여부
  downgrade_on_fail: true      # 실패 시 강화 수치 감소 여부
  safe_upgrade_level: 3        # 안전 강화 레벨 (이 레벨까지는 실패해도 파괴되지 않음)

# ============================================================================
# 도끼 공격속도 시스템 설정
# ============================================================================
axe_speed_system:
  enabled: true                 # 도끼 속도 시스템 활성화 여부

  # 속도 보너스 설정
  speed_per_level: 0.02         # 강화 레벨당 공격속도 2% 증가
  max_speed_bonus: 0.20         # 최대 공격속도 보너스 20%

  # 적용 도끼 종류
  axe_types:
    - WOODEN_AXE
    - STONE_AXE
    - IRON_AXE
    - GOLDEN_AXE
    - DIAMOND_AXE
    - NETHERITE_AXE

# ============================================================================
# 드래곤 보상 시스템 설정
# ============================================================================
dragon_reward_system:
  enabled: true                 # 드래곤 보상 시스템 활성화 여부

  # 기본 보상
  base_reward:
    money: 50000                # 기본 돈 보상
    exp: 1000                   # 기본 경험치 보상

  # 직업별 추가 보상
  job_bonus:
    tank:
      money_multiplier: 1.2     # 탱커 돈 보상 20% 증가
      items:
        - "SHIELD:1"
        - "IRON_INGOT:32"
    warrior:
      money_multiplier: 1.1     # 전사 돈 보상 10% 증가
      items:
        - "DIAMOND_SWORD:1"
        - "DIAMOND:16"
    archer:
      money_multiplier: 1.0     # 궁수 기본 보상
      items:
        - "BOW:1"
        - "ARROW:64"

  # 특별 보상 (확률)
  special_rewards:
    dragon_egg_chance: 0.05     # 드래곤 알 드롭 확률 5%
    elytra_chance: 0.10         # 엘리트라 드롭 확률 10%
    dragon_head_chance: 0.15    # 드래곤 머리 드롭 확률 15%

# ============================================================================
# NPC 교환 시스템 설정
# ============================================================================
npc_trade_system:
  enabled: true                 # NPC 교환 시스템 활성화 여부

  # 기본 교환 상점
  default_trades:
    # 음식 상점
    food_merchant:
      name: "음식 상인"
      location: "world:0:70:0"
      trades:
        - input: "EMERALD:1"
          output: "COOKED_BEEF:16"
        - input: "EMERALD:2"
          output: "GOLDEN_APPLE:1"

    # 도구 상점
    tool_merchant:
      name: "도구 상인"
      location: "world:10:70:0"
      trades:
        - input: "DIAMOND:3"
          output: "DIAMOND_PICKAXE:1"
        - input: "IRON_INGOT:10"
          output: "IRON_SWORD:1"

  # 교환 설정
  trade_cooldown: 300           # 교환 쿨다운 (5분)
  max_trades_per_day: 10        # 일일 최대 교환 횟수

# ============================================================================
# 엔더 리셋 시스템 설정 (새로 추가)
# ============================================================================
ender_reset_system:
  enabled: false                # 엔더 리셋 시스템 활성화 여부 (기본 비활성화)

# 엔더 리셋 세부 설정
ender_reset:
  # 리셋 시간 설정
  hour: 12                      # 리셋 시간 (0-23)
  minute: 0                     # 리셋 분 (0-59)

  # 엔드시티 차단 설정
  block_end_cities: true        # 엔드시티 접근 차단 여부
  end_city_min_distance: 1000   # 엔드시티 차단 최소 거리 (블록)

  # BungeeCord 설정
  target_server: "lobby"        # 플레이어 이동 대상 서버명

  # 알림 설정
  warning_times:                # 예고 알림 시간 (분 단위)
    - 10
    - 5
    - 3
    - 1

  # 리셋 방식 설정
  reset_method: "regenerate"    # 리셋 방식: "regenerate" 또는 "delete"
  backup_before_reset: true     # 리셋 전 백업 여부

  # 안전 설정
  force_reset_confirmation: true # 강제 리셋 시 확인 단계
  evacuation_delay: 5           # 플레이어 대피 대기 시간 (초)

# ============================================================================
# 성능 및 시스템 설정
# ============================================================================
performance:
  # 자동 저장 설정
  auto_save:
    enabled: true               # 자동 저장 활성화
    interval: 300               # 자동 저장 간격 (5분)

  # 메모리 관리
  memory_cleanup:
    enabled: true               # 메모리 정리 활성화
    interval: 1800              # 메모리 정리 간격 (30분)

  # 캐시 설정
  cache:
    player_data_cache_size: 100 # 플레이어 데이터 캐시 크기
    cache_expire_time: 3600     # 캐시 만료 시간 (1시간)

# ============================================================================
# 로깅 및 디버그 설정
# ============================================================================
logging:
  # 로그 레벨
  level: "INFO"                 # DEBUG, INFO, WARNING, ERROR

  # 상세 로깅
  detailed_logging:
    database_operations: false  # 데이터베이스 작업 로깅
    player_actions: false       # 플레이어 행동 로깅
    system_events: true         # 시스템 이벤트 로깅

  # 오류 보고
  error_reporting:
    enabled: true               # 오류 보고 활성화
    include_stack_trace: true   # 스택 트레이스 포함

# ============================================================================
# 호환성 설정
# ============================================================================
compatibility:
  # 플러그인 연동
  plugins:
    vault: true                 # Vault 연동
    placeholder_api: true       # PlaceholderAPI 연동
    worldguard: true           # WorldGuard 연동
    essentials: true           # Essentials 연동

  # 버전 호환성
  minecraft_version: "1.20"     # 대상 마인크래프트 버전
  api_version: "1.20"          # 대상 API 버전

# ============================================================================
# 관리자 설정
# ============================================================================
admin:
  # 관리자 명령어
  commands:
    enable_debug: false         # 디버그 명령어 활성화
    enable_test: true          # 테스트 명령어 활성화

  # 알림 설정
  notifications:
    startup_complete: true      # 시작 완료 알림
    error_alerts: true         # 오류 알림
    performance_warnings: true  # 성능 경고

# ============================================================================
# 추가 기능 설정
# ============================================================================
features:
  # 실험적 기능
  experimental:
    advanced_caching: false     # 고급 캐싱 (실험적)
    async_processing: true      # 비동기 처리

  # 보안 기능
  security:
    rate_limiting: true         # 요청 제한
    input_validation: true      # 입력 검증

  # 사용자 경험
  user_experience:
    actionbar_notifications: true # 액션바 알림
    sound_effects: true         # 효과음
    particle_effects: false    # 파티클 효과 (성능 고려)