# 디버그 및 로깅 설정
debug:
  enabled: false                     # 디버그 모드
  log_job_effects: false             # 직업 효과 로깅
  log_upgrade_attempts: true         # 강화 시도 로깅
  log_database_queries: false        # DB 쿼리 로깅

# 성능 최적화 설정
performance:
  job_effect_interval: 40            # 직업 효과 적용 간격 (틱)
  cache_job_data: true               # 직업 데이터 캐싱
  async_database_operations: true    # 비동기 DB 작업
  max_concurrent_upgrades: 10        # 동시 강화 최대 수