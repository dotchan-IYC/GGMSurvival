# ============================================================================
# GGMSurvival 완전 통합 야생 서버 플러그인 설정
# HikariCP + EnderResetManager 버전
# ============================================================================

name: GGMSurvival
version: '${version}'
main: com.ggm.ggmsurvival.GGMSurvival
api-version: '1.20'
author: GGM Development Team
description: 완전 통합 야생 서버 플러그인 - HikariCP + EnderResetManager

# ============================================================================
# 플러그인 의존성 및 로드 순서
# ============================================================================
depend: []
softdepend:
  - GGMCore
  - Vault
  - PlaceholderAPI

loadbefore:
  - Essentials
  - WorldEdit
  - WorldGuard

# ============================================================================
# 명령어 정의
# ============================================================================
commands:
  # 직업 시스템 명령어
  job:
    description: 직업 시스템 명령어
    usage: /job <info|change|reset|level|list>
    permission: ggm.job
    aliases: [직업, jobs]

  # 강화 시스템 명령어
  upgrade:
    description: 장비 강화 시스템
    usage: /upgrade
    permission: ggm.upgrade
    aliases: [강화, enchant]

  # 거래 시스템 명령어
  trade:
    description: NPC 거래 시스템
    usage: /trade <create|remove|list>
    permission: ggm.trade
    aliases: [거래, npc]

  # 드래곤 시스템 명령어
  dragon:
    description: 드래곤 보상 시스템
    usage: /dragon <info|stats>
    permission: ggm.dragon
    aliases: [드래곤]

  # 메인 플러그인 명령어
  survival:
    description: GGMSurvival 메인 명령어
    usage: /survival <reload|stats|info|help|status|performance|test>
    permission: ggm.survival
    aliases: [야생, ggmsurvival]

  # 엔더 리셋 시스템 명령어
  enderreset:
    description: 엔더 자동 리셋 시스템
    usage: /enderreset <info|status|force|schedule|block|reload|test>
    permission: ggm.enderreset
    aliases: [엔더리셋, endrreset, er]

# ============================================================================
# 권한 시스템
# ============================================================================
permissions:
  # ==========================================================================
  # 기본 사용자 권한
  # ==========================================================================
  ggm.survival:
    description: 기본 야생 서버 기능 사용
    default: true
    children:
      ggm.survival.info: true

  ggm.survival.info:
    description: 서버 정보 확인
    default: true

  # ==========================================================================
  # 직업 시스템 권한
  # ==========================================================================
  ggm.job:
    description: 직업 시스템 기본 사용 권한
    default: true
    children:
      ggm.job.info: true
      ggm.job.change: true
      ggm.job.list: true

  ggm.job.info:
    description: 직업 정보 확인
    default: true

  ggm.job.change:
    description: 직업 변경
    default: true

  ggm.job.reset:
    description: 직업 초기화
    default: false

  ggm.job.level:
    description: 직업 레벨 관리
    default: false

  ggm.job.list:
    description: 직업 목록 확인
    default: true

  ggm.job.admin:
    description: 직업 시스템 관리자 권한
    default: false
    children:
      ggm.job.*: true

  # ==========================================================================
  # 강화 시스템 권한
  # ==========================================================================
  ggm.upgrade:
    description: 장비 강화 시스템 사용
    default: true

  ggm.upgrade.admin:
    description: 강화 시스템 관리자 권한
    default: false

  # ==========================================================================
  # 거래 시스템 권한
  # ==========================================================================
  ggm.trade:
    description: NPC 거래 시스템 사용
    default: true

  ggm.trade.create:
    description: NPC 거래 생성
    default: false

  ggm.trade.remove:
    description: NPC 거래 삭제
    default: false

  ggm.trade.admin:
    description: NPC 거래 시스템 관리자 권한
    default: false
    children:
      ggm.trade.*: true

  # ==========================================================================
  # 드래곤 보상 권한
  # ==========================================================================
  ggm.dragon:
    description: 드래곤 보상 시스템 사용
    default: true

  ggm.dragon.admin:
    description: 드래곤 보상 시스템 관리자 권한
    default: false

  # ==========================================================================
  # 엔더 리셋 시스템 권한
  # ==========================================================================
  ggm.enderreset:
    description: 엔더 리셋 시스템 기본 사용
    default: true
    children:
      ggm.enderreset.info: true
      ggm.enderreset.status: true

  ggm.enderreset.info:
    description: 엔더 리셋 정보 확인
    default: true

  ggm.enderreset.status:
    description: 엔더 리셋 상태 확인
    default: true

  ggm.enderreset.admin:
    description: 엔더 리셋 시스템 관리자 권한
    default: false
    children:
      ggm.enderreset.*: true

  ggm.enderreset.force:
    description: 강제 엔더 리셋 실행
    default: false

  ggm.enderreset.schedule:
    description: 엔더 리셋 시간 설정
    default: false

  ggm.enderreset.block:
    description: 엔드시티 차단 설정
    default: false

  ggm.enderreset.bypass:
    description: 엔드시티 차단 무시
    default: false

  ggm.enderreset.reload:
    description: 엔더 리셋 설정 리로드
    default: false

  # ==========================================================================
  # 관리자 권한
  # ==========================================================================
  ggm.survival.admin:
    description: 야생 서버 관리자 권한
    default: false
    children:
      ggm.survival.*: true
      ggm.job.admin: true
      ggm.upgrade.admin: true
      ggm.trade.admin: true
      ggm.dragon.admin: true
      ggm.enderreset.admin: true

  ggm.survival.reload:
    description: 플러그인 리로드
    default: false

  ggm.survival.performance:
    description: 성능 정보 확인
    default: false

  ggm.survival.test:
    description: 시스템 테스트 실행
    default: false

  # ==========================================================================
  # 최고 관리자 권한
  # ==========================================================================
  ggm.*:
    description: 모든 GGM 플러그인 권한
    default: false
    children:
      ggm.survival.*: true
      ggm.job.*: true
      ggm.upgrade.*: true
      ggm.trade.*: true
      ggm.dragon.*: true
      ggm.enderreset.*: true
      ggm.debug: true

  # ==========================================================================
  # 개발자 권한 (디버깅 및 테스트용)
  # ==========================================================================
  ggm.dev:
    description: 개발자 권한 (모든 기능 + 디버깅)
    default: false
    children:
      ggm.*: true
      ggm.debug: true

  ggm.debug:
    description: 디버그 모드 접근 권한
    default: false

# ============================================================================
# 플러그인 호환성 및 의존성
# ============================================================================
# softdepend에 명시된 플러그인들과의 연동:
# - GGMCore: 경제 시스템 및 공통 기능 연동
# - Vault: 경제 시스템 호환성 (옵션)
# - PlaceholderAPI: 플레이스홀더 지원

# loadbefore에 명시된 플러그인들보다 먼저 로드:
# - Essentials: 충돌 방지
# - WorldEdit: 월드 편집 기능과의 호환성
# - WorldGuard: 지역 보호 기능과의 호환성

# ============================================================================
# 플러그인 메타데이터
# ============================================================================
website: https://ggm.server.com
prefix: GGMSurvival

folia-supported: false
load: STARTUP

libraries:
  - com.zaxxer:HikariCP:5.0.1
  - mysql:mysql-connector-java:8.0.33

# ============================================================================
# 추가 설정
# ============================================================================
contributors:
  - "GGM Development Team"
  - "Server Management Team"

features:
  - "직업 시스템 (탱커, 전사, 궁수)"
  - "장비 강화 시스템 (1~10강)"
  - "엔더 자동 리셋 시스템"
  - "엔드시티 접근 차단"
  - "드래곤 보상 시스템"
  - "NPC 거래 시스템"
  - "HikariCP 데이터베이스 최적화"
  - "BungeeCord 멀티 서버 지원"
  - "실시간 성능 모니터링"

changelog:
  "2.0-HIKARICP-ENDER":
    - "HikariCP 데이터베이스 연결 풀 도입"
    - "엔더 자동 리셋 시스템 완전 구현"
    - "엔드시티 접근 차단 기능"
    - "BungeeCord 멀티 서버 지원"
    - "성능 최적화 및 메모리 관리 개선"
    - "스레드 안전성 강화"
    - "포괄적인 오류 처리 및 복구 시스템"
    - "이모티콘 제거 및 텍스트 기반 UI"
    - "명령어 시스템 완전 재구성"
    - "권한 시스템 세분화"

technical_details:
  database:
    type: "MySQL with HikariCP"
    features: ["Connection Pooling", "Leak Detection", "Performance Optimization"]
  
  systems:
    job_system: "3개 직업 (탱커, 전사, 궁수) + 레벨링"
    upgrade_system: "1-10강 장비 강화 + 도끼 속도 보너스"
    ender_reset: "일정 시간 자동 리셋 + 엔드시티 차단"
    dragon_reward: "직업별 차등 보상 + 특별 아이템"
    npc_trade: "커스텀 NPC 거래 + 쿨다운"
  
  performance:
    async_processing: true
    memory_management: true
    connection_pooling: true
    caching: true

compatibility:
  minecraft_versions: ["1.20", "1.20.1", "1.20.2", "1.20.3", "1.20.4"]
  server_software: ["Paper", "Purpur", "Airplane"]
  java_versions: [17, 18, 19, 20, 21]

security:
  input_validation: true
  sql_injection_protection: true
  permission_checking: true
  rate_limiting: true