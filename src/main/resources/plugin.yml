name: GGMSurvival
version: '${version}'
main: com.ggm.ggmsurvival.GGMSurvival
api-version: '1.20'
author: GGM Development Team
description: 완전 통합 야생 서버 플러그인 - HikariCP + EnderResetManager

# ============================================================================
# 플러그인 의존성 및 로드 순서
# ============================================================================
depend: []
softdepend:
  - GGMCore
  - Vault
  - PlaceholderAPI

loadbefore:
  - Essentials
  - WorldEdit
  - WorldGuard

# ============================================================================
# 명령어 정의 (엔더 리셋 명령어 추가)
# ============================================================================
commands:
  # 직업 시스템 명령어
  job:
    description: 직업 시스템 명령어
    usage: /job <info|change|reset|level|list>
    permission: ggm.job
    aliases: [직업, jobs]

  # 강화 시스템 명령어
  upgrade:
    description: 장비 강화 시스템
    usage: /upgrade
    permission: ggm.upgrade
    aliases: [강화, enchant]

  # 거래 시스템 명령어
  trade:
    description: NPC 거래 시스템
    usage: /trade <create|remove|list>
    permission: ggm.trade
    aliases: [거래, npc]

  # 드래곤 시스템 명령어
  dragon:
    description: 드래곤 보상 시스템
    usage: /dragon <info|stats>
    permission: ggm.dragon
    aliases: [드래곤]

  # 메인 플러그인 명령어
  survival:
    description: GGMSurvival 메인 명령어
    usage: /survival <reload|stats|info|help>
    permission: ggm.survival
    aliases: [야생, ggmsurvival]

  # 엔더 리셋 시스템 명령어 (새로 추가)
  enderreset:
    description: 엔더 자동 리셋 시스템
    usage: /enderreset <info|status|force|schedule|block|reload|test>
    permission: ggm.enderreset
    aliases: [엔더리셋, endrreset, er]

# ============================================================================
# 권한 시스템 (엔더 리셋 권한 추가)
# ============================================================================
permissions:
  # ==========================================================================
  # 기본 사용자 권한
  # ==========================================================================
  ggm.job:
    description: 직업 시스템 사용
    default: true
    children:
      ggm.job.info: true
      ggm.job.change: true

  ggm.job.info:
    description: 직업 정보 확인
    default: true

  ggm.job.change:
    description: 직업 변경
    default: true

  ggm.upgrade:
    description: 강화 시스템 사용
    default: true

  ggm.trade:
    description: NPC 거래 사용
    default: true

  ggm.dragon:
    description: 드래곤 보상 시스템 사용
    default: true

  ggm.survival:
    description: 기본 야생 서버 기능 사용
    default: true

  # 엔더 리셋 기본 권한 (새로 추가)
  ggm.enderreset:
    description: 엔더 리셋 정보 확인
    default: true
    children:
      ggm.enderreset.info: true
      ggm.enderreset.status: true

  ggm.enderreset.info:
    description: 엔더 리셋 정보 확인
    default: true

  ggm.enderreset.status:
    description: 엔더 리셋 상태 확인
    default: true

  # ==========================================================================
  # 관리자 권한
  # ==========================================================================
  ggm.job.admin:
    description: 직업 시스템 관리
    default: op
    children:
      ggm.job: true
      ggm.job.reset: true
      ggm.job.setlevel: true
      ggm.job.reload: true

  ggm.job.reset:
    description: 직업 초기화 권한
    default: op

  ggm.job.setlevel:
    description: 직업 레벨 설정 권한
    default: op

  ggm.job.reload:
    description: 직업 시스템 설정 리로드 권한
    default: op

  ggm.upgrade.admin:
    description: 강화 시스템 관리
    default: op
    children:
      ggm.upgrade: true
      ggm.upgrade.force: true
      ggm.upgrade.reload: true

  ggm.upgrade.force:
    description: 강제 강화 권한
    default: op

  ggm.upgrade.reload:
    description: 강화 시스템 설정 리로드 권한
    default: op

  ggm.upgrade.stats:
    description: 강화 시스템 통계 확인 권한
    default: op

  ggm.npc.admin:
    description: NPC 시스템 관리
    default: op
    children:
      ggm.trade: true
      ggm.npc.create: true
      ggm.npc.remove: true
      ggm.npc.list: true

  ggm.npc.create:
    description: NPC 생성 권한
    default: op

  ggm.npc.remove:
    description: NPC 제거 권한
    default: op

  ggm.npc.list:
    description: NPC 목록 확인 권한
    default: op

  ggm.dragon.admin:
    description: 드래곤 시스템 관리
    default: op
    children:
      ggm.dragon: true
      ggm.dragon.reload: true
      ggm.dragon.stats: true

  ggm.dragon.reload:
    description: 드래곤 시스템 리로드 권한
    default: op

  ggm.dragon.stats:
    description: 드래곤 시스템 통계 권한
    default: op

  ggm.survival.admin:
    description: 야생 서버 관리
    default: op
    children:
      ggm.survival: true
      ggm.survival.reload: true
      ggm.survival.stats: true

  ggm.survival.reload:
    description: 서버 설정 리로드 권한
    default: op

  ggm.survival.stats:
    description: 서버 통계 확인 권한
    default: op

  # ==========================================================================
  # 엔더 리셋 관리자 권한 (새로 추가)
  # ==========================================================================
  ggm.enderreset.admin:
    description: 엔더 리셋 시스템 관리
    default: op
    children:
      ggm.enderreset: true
      ggm.enderreset.force: true
      ggm.enderreset.schedule: true
      ggm.enderreset.block: true
      ggm.enderreset.reload: true
      ggm.enderreset.test: true

  ggm.enderreset.force:
    description: 강제 엔더 리셋 권한
    default: op

  ggm.enderreset.schedule:
    description: 엔더 리셋 시간 설정 권한
    default: op

  ggm.enderreset.block:
    description: 엔드시티 차단 설정 권한
    default: op

  ggm.enderreset.reload:
    description: 엔더 리셋 설정 리로드 권한
    default: op

  ggm.enderreset.test:
    description: 엔더 리셋 시스템 테스트 권한
    default: op

  ggm.enderreset.bypass:
    description: 엔드시티 차단 우회 권한 (관리자용)
    default: op

  # ==========================================================================
  # 전체 권한 (슈퍼 관리자)
  # ==========================================================================
  ggm.*:
    description: 모든 GGM 야생 서버 권한
    default: op
    children:
      # 기본 권한
      ggm.job: true
      ggm.upgrade: true
      ggm.trade: true
      ggm.dragon: true
      ggm.survival: true
      ggm.enderreset: true
      
      # 관리자 권한
      ggm.job.admin: true
      ggm.upgrade.admin: true
      ggm.npc.admin: true
      ggm.dragon.admin: true
      ggm.survival.admin: true
      ggm.enderreset.admin: true

  ggm.admin:
    description: GGM 관리자 권한 (전체 권한과 동일)
    default: op
    children:
      ggm.*: true

  # ==========================================================================
  # 개발자 권한 (디버깅 및 테스트용)
  # ==========================================================================
  ggm.dev:
    description: 개발자 권한 (모든 기능 + 디버깅)
    default: false
    children:
      ggm.*: true
      ggm.debug: true

  ggm.debug:
    description: 디버그 모드 접근 권한
    default: false

# ============================================================================
# 플러그인 호환성 및 의존성
# ============================================================================
# softdepend에 명시된 플러그인들과의 연동:
# - GGMCore: 경제 시스템 및 공통 기능 연동
# - Vault: 경제 시스템 호환성 (옵션)
# - PlaceholderAPI: 플레이스홀더 지원

# loadbefore에 명시된 플러그인들보다 먼저 로드:
# - Essentials: 충돌 방지
# - WorldEdit: 월드 편집 기능과의 호환성
# - WorldGuard: 지역 보호 기능과의 호환성

# ============================================================================
# 플러그인 메타데이터
# ============================================================================
website: https://ggm.server.com
prefix: GGMSurvival

folia-supported: false
load: STARTUP

libraries:
  - com.zaxxer:HikariCP:5.0.1
  - mysql:mysql-connector-java:8.0.33

# ============================================================================
# 추가 설정
# ============================================================================
contributors:
  - "GGM Development Team"
  - "Server Management Team"

features:
  - "직업 시스템 (탱커, 전사, 궁수)"
  - "장비 강화 시스템 (1~10강)"
  - "엔더 자동 리셋 시스템"
  - "엔드시티 접근 차단"
  - "드래곤 보상 시스템"
  - "NPC 거래 시스템"
  - "HikariCP 데이터베이스 최적화"
  - "BungeeCord 멀티 서버 지원"
  - "실시간 성능 모니터링"

changelog:
  "2.0-HIKARICP-ENDER":
    - "HikariCP 데이터베이스 연결 풀 도입"
    - "엔더 자동 리셋 시스템 완전 구현"
    - "엔드시티 접근 차단 기능"
    - "BungeeCord 멀티 서버 지원"
    - "성능 최적화 및 메모리 관리 개선"
    - "스레드 안전성 강화"
    - "포괄적인 오류 처리 및 복구 시스템"