name: GGMSurvival
version: '2.0-NEW-PATCH'
main: com.ggm.ggmsurvival.GGMSurvival
api-version: 1.20
authors: [ DotC ]
description: GGM 새로운 패치 - 검/도끼/활/흉갑만 강화, 직업레벨 시스템, 엔더 리셋
website: https://ggm.server.com
depend: []
softdepend: [GGMCore]

commands:
  job:
    description: 새로운 직업레벨 시스템 - 몬스터 처치로 성장
    usage: /job [select|info|list|reset|setlevel|addexp]
    aliases: [jobs, 직업]
    permission: ggm.job

  upgrade:
    description: 새로운 강화 시스템 - 검/도끼/활/흉갑만 강화 가능
    usage: /upgrade [info|guide|rates|gui|direct|items]
    aliases: [강화, enhance]
    permission: ggm.upgrade

  npc:
    description: NPC 교환상 관리 (OP 전용)
    usage: /npc <create|remove|list> [타입]
    permission: ggm.npc.admin

  trade:
    description: NPC와 아이템 교환
    usage: /trade [prices|merchants]
    aliases: [교환]
    permission: ggm.trade

  dragon:
    description: 드래곤 처치 기록 확인
    usage: /dragon [info|today|history]
    aliases: [드래곤]
    permission: ggm.dragon

  enderreset:
    description: 엔더 리셋 시스템 관리
    usage: /enderreset [info|force|schedule|block|reload]
    aliases: [엔더리셋, ender]
    permission: ggm.enderreset

  survival:
    description: 야생 서버 정보 및 관리
    usage: /survival [info|reload|stats|patch]
    aliases: [야생, ggmsurvival]
    permission: ggm.survival

permissions:
  # 기본 플레이어 권한
  ggm.job:
    description: 새로운 직업레벨 시스템 사용
    default: true

  ggm.upgrade:
    description: 새로운 강화 시스템 사용 (검/도끼/활/흉갑만)
    default: true

  ggm.trade:
    description: NPC 교환 사용
    default: true

  ggm.dragon:
    description: 드래곤 정보 확인
    default: true

  ggm.enderreset:
    description: 엔더 리셋 정보 확인
    default: true

  ggm.survival:
    description: 야생 서버 기본 정보
    default: true

  # 관리자 권한
  ggm.job.admin:
    description: 직업 시스템 관리 (직업 초기화, 레벨 설정, 경험치 추가)
    default: op

  ggm.upgrade.admin:
    description: 강화 시스템 관리
    default: op

  ggm.npc.admin:
    description: NPC 관리
    default: op

  ggm.dragon.admin:
    description: 드래곤 시스템 관리
    default: op

  ggm.enderreset.admin:
    description: 엔더 리셋 시스템 관리 (강제 리셋, 시간 변경, 차단 설정)
    default: op

  ggm.enderreset.bypass:
    description: 엔드시티 차단 우회 (관리자용)
    default: op

  ggm.survival.admin:
    description: 야생 서버 관리
    default: op

  # 전체 권한
  ggm.*:
    description: 모든 GGM 야생 권한
    default: op
    children:
      ggm.job: true
      ggm.upgrade: true
      ggm.trade: true
      ggm.dragon: true
      ggm.enderreset: true
      ggm.survival: true
      ggm.job.admin: true
      ggm.upgrade.admin: true
      ggm.npc.admin: true
      ggm.dragon.admin: true
      ggm.enderreset.admin: true
      ggm.enderreset.bypass: true
      ggm.survival.admin: true